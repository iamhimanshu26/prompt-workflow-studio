services:
  postgres:
    image: postgres:16-alpine
    container_name: pws-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pws
      POSTGRES_PASSWORD: pws_dev
      POSTGRES_DB: prompt_workflow_studio
    volumes:
      - pws_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pws -d prompt_workflow_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pws_pg_data:
